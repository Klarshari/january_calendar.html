<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>January Calendar</title>
  <style>
    table {
      border-collapse: collapse;
      width: 700px;
    }
    th, td {
      border: 1px solid black;
      width: 100px;
      height: 80px;
      vertical-align: top;   /* align numbers to top */
      text-align: left;      /* align numbers to left */
      padding: 5px;
      font-family: Arial, sans-serif;
    }
    th {
      background-color: #f2f2f2;
    }
    .birthday {
      background-color: #ffcccb; /* highlight */
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>January 2026</h1>

<table>
  <tr>
    <th>Sun</th>
    <th>Mon</th>
    <th>Tue</th>
    <th>Wed</th>
    <th>Thu</th>
    <th>Fri</th>
    <th>Sat</th>
  </tr>

  <!-- Week 1 -->
  <tr>
    <td></td>
    <td></td>
    <td></td>
    <td></td>
    <td>1</td>
    <td>2</td>
    <td>3</td>
  </tr>

  <!-- Week 2 -->
  <tr>
    <td>4</td>
    <td>5</td>
    <td>6</td>
    <td>7</td>
    <td>8</td>
    <td>9</td>
    <td>10</td>
  </tr>

  <!-- Week 3 -->
  <tr>
    <td>11</td>
    <td class="birthday">12</td>
    <td>13</td>
    <td>14</td>
    <td>15</td>
    <td>16</td>
    <td>17</td>
  </tr>

  <!-- Week 4 -->
  <tr>
    <td>18</td>
    <td>19</td>
    <td>20</td>
    <td>21</td>
    <td>22</td>
    <td>23</td>
    <td>24</td>
  </tr>

  <!-- Week 5 -->
  <tr>
    <td>25</td>
    <td>26</td>
    <td>27</td>
    <td>28</td>
    <td>29</td>
    <td>30</td>
    <td>31</td>
  </tr>

</table>

<p><strong>My birthday is highlighted above.</strong></p>

</body>
</html>
